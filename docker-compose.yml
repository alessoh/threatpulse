version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: threatpulse
      POSTGRES_PASSWORD: threatpulse_dev
      POSTGRES_DB: threatpulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://threatpulse:threatpulse_dev@db:5432/threatpulse
    depends_on:
      - db
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

  scraper:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://threatpulse:threatpulse_dev@db:5432/threatpulse
    depends_on:
      - db
    command: python -m app.scrapers.run --watch

volumes:
  pgdata:
